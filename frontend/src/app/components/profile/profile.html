<div class="page-container">
  <div class="profile-card">
    <div class="header-row">
      <h2>My Profile</h2>
    </div>

    <p class="subtitle">
      {{ isReadOnly ? 'Review your personal details.' : 'Update your personal details and password.' }}
    </p>

    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="form-layout">

      <div class="name-row">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" formControlName="firstName">
        </div>

        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" formControlName="lastName">
        </div>
      </div>

      <!-- Só mostra o campo da password se estiver em modo de edição -->
      @if (!isReadOnly) {
        <div class="form-group">
          <label for="password">New Password</label>
          <input type="password" id="password" formControlName="password" placeholder="Leave blank to keep current password">
        </div>
      }

      @if (successMessage) {
        <div class="success-message">
          <span class="material-symbols-outlined">check_circle</span>
          {{ successMessage }}
        </div>
      }

      @if (errorMessage) {
        <div class="error-message">
          <span class="material-symbols-outlined">error</span>
          {{ errorMessage }}
        </div>
      }

      <div class="form-actions">
        <!-- Vista "Read-Only" -->
        @if (isReadOnly) {
          <button type="button" class="btn-primary" (click)="enableEditing()">
            <span class="material-symbols-outlined">edit</span>
            Edit Profile
          </button>
        }

        <!-- Vista "Edit Mode" -->
        @if (!isReadOnly) {
          <button type="button" class="btn-secondary" (click)="cancelEditing()">
            Cancel
          </button>

          <button type="submit" class="btn-primary" [disabled]="profileForm.invalid || isLoading">
            <span class="material-symbols-outlined">save</span>
            {{ isLoading ? 'Saving...' : 'Save Changes' }}
          </button>
        }
      </div>

    </form>
  </div>
</div>
