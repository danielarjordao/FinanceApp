name: CI Pipeline

on:
  pull_request:
    branches: [ develop, main ]
  push:
    branches: [ develop, main ]

jobs:
  backend-checks:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Fazer o checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js (Versão 24)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar dependências
        run: npm install

      - name: Executar o Build (Verificar tipagem)
        run: npm run build

      - name: Executar Testes Unitários
        run: npm test

  frontend-checks:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        API_URL: ${{ secrets.API_URL }}

    steps:
      - name: Fazer o checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js (Versão 24)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instalar dependências
        run: npm install

      - name: Executar o Build Angular (Verifica tipagem e sintaxe)
        run: npm run build
